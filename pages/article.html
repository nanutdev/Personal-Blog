<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Article - Personal Blog</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <link rel="stylesheet" href="../assets/css/style.css" />
      <link rel="stylesheet" href="../assets/css/home.css" />
      <link rel="stylesheet" href="../assets/css/article.css" />
   </head>
   <body>
      <header class="header">
         <a href="../index.html" class="logo">My<span>Blog</span></a>
         <nav class="header-nav">
            <a href="../index.html#articles" class="nav-link">Articles</a>
            <a href="#" class="nav-link">About</a>
         </nav>
      </header>

      <main class="article-view-container">
         <div id="loading" class="loading">Loading article...</div>
         <article id="article-content" class="article-content" style="display: none;">
            <div class="article-header">
               <div id="article-date" class="article-date"></div>
               <h1 id="article-title" class="article-title-main"></h1>
            </div>
            <div id="article-body" class="article-body"></div>
         </article>
         <div id="error-message" class="error-message" style="display: none;"></div>
      </main>

      <script src="../assets/js/article.js"></script>
   </body>
</html>
