<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Dashboard - Personal Blog</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <link rel="stylesheet" href="../assets/css/style.css" />
      <link rel="stylesheet" href="../assets/css/dashboard.css" />
   </head>
   <body class="dashboard-page">
      <header class="header">
         <a href="../index.html" class="logo">My<span>Blog</span></a>
         <nav class="header-nav">
            <a href="article-create.html" class="btn-primary">Create Article</a>
         </nav>
      </header>

      <main class="dashboard-main">
         <div class="dashboard-header">
            <h1 class="page-title">Manage Articles</h1>
         </div>

         <div class="table-container">
            <table class="article-table">
               <thead>
                  <tr>
                     <th>Title</th>
                     <th>Date</th>
                     <th>Status</th>
                     <th class="actions-col">Actions</th>
                  </tr>
               </thead>
               <tbody id="content-table"></tbody>
            </table>
         </div>
      </main>

      <script src="../assets/js/dashboard.js"></script>
   </body>
</html>
